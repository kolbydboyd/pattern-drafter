name: Cron — Images

on:
  schedule:
    # 7:00 AM UTC daily
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cron-images endpoint
        run: |
          curl --fail -X POST "${{ secrets.SITE_URL }}/api/cron-images" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
