name: Cron — Emails

on:
  schedule:
    # 2:00 PM UTC daily
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cron-emails endpoint
        run: |
          curl --fail -X POST "${{ secrets.SITE_URL }}/api/cron-emails" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
