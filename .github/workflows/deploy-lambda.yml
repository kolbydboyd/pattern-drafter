name: Deploy Lambda

on:
  push:
    branches: [main]
    paths:
      - 'lambda/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install production dependencies
        run: npm ci --omit=dev

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Package and deploy to Lambda
        run: |
          set -e

          zip -r /tmp/lambda-package.zip lambda/ src/ node_modules/

          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="peoples-patterns-deploy-${ACCOUNT}"
          aws s3api create-bucket --bucket "$BUCKET" --region us-east-1 2>/dev/null || true
          aws s3 cp /tmp/lambda-package.zip "s3://${BUCKET}/lambda-package.zip"

          # Update GeneratePattern
          aws lambda update-function-code \
            --function-name peoples-patterns-generate \
            --s3-bucket "$BUCKET" \
            --s3-key lambda-package.zip
          sleep 20
          aws lambda update-function-configuration \
            --function-name peoples-patterns-generate \
            --handler lambda/generate-pattern.handler \
            --runtime nodejs22.x \
            --memory-size 1024 \
            --timeout 60
          sleep 20

          # Update RegeneratePattern
          aws lambda update-function-code \
            --function-name peoples-patterns-regenerate \
            --s3-bucket "$BUCKET" \
            --s3-key lambda-package.zip
          sleep 20
          aws lambda update-function-configuration \
            --function-name peoples-patterns-regenerate \
            --handler lambda/regenerate-pattern.handler \
            --runtime nodejs22.x \
            --memory-size 1024 \
            --timeout 60
