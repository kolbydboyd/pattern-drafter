name: Cron — Sitemap

on:
  schedule:
    # 6:00 AM UTC daily
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cron-sitemap endpoint
        run: |
          curl --fail -X POST "${{ secrets.SITE_URL }}/api/cron-sitemap" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
