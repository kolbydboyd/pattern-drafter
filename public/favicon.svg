<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded square background — brand dark -->
  <rect width="32" height="32" rx="6" fill="#1a1714"/>
  <!--
    Serif capital P — Fraunces-inspired proportions
    Stem: x=8–11.5 (3.5px), serifs: x=5.5–14
    Bowl: upper 60% of glyph, outer peak at x≈25
    fill-rule evenodd cuts the counter out of the fill
  -->
  <path fill-rule="evenodd" fill="#c9a96e" d="
    M 5.5,5
    H 14
    V 7
    H 11.5
    C 11.5,7 25.5,7 25.5,13.5
    C 25.5,20 11.5,20 11.5,20
    V 25
    H 14
    V 27
    H 5.5
    V 25
    H 8
    V 7
    H 5.5
    Z
    M 11.5,10
    C 11.5,10 22,10 22,13.5
    C 22,17 11.5,17 11.5,17
    Z
  "/>
</svg>
