<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- collar tunnel at top -->
  <rect x="30" y="55" width="100" height="10" rx="2"/>
  <!-- tunnel stitching lines -->
  <line x1="30" y1="60" x2="130" y2="60" stroke-dasharray="3 2" stroke-width="1"/>

  <!-- bandana triangle -->
  <path d="M30,65 L130,65 L80,150 Z"/>

  <!-- fold line from top corners to center -->
  <line x1="30" y1="65" x2="80" y2="107" stroke-dasharray="4 3" stroke-width="1"/>
  <line x1="130" y1="65" x2="80" y2="107" stroke-dasharray="4 3" stroke-width="1"/>

  <!-- center fold line (vertical crease) -->
  <line x1="80" y1="65" x2="80" y2="150" stroke-dasharray="4 3" stroke-width="1"/>

</svg>
