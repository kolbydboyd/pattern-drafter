<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- oversized straight-leg sweatpant: wider legs, no taper, heavier rib-band waist -->
  <!-- self-fabric waistband casing (a bit taller than base sweatpants) -->
  <path d="M40,36 L120,36 L120,52 L40,52 Z"/>
  <!-- external drawcord through front grommets -->
  <circle cx="74" cy="44" r="1.3"/>
  <circle cx="86" cy="44" r="1.3"/>
  <path d="M68,52 Q74,58 80,54 Q86,58 92,52"/>
  <!-- legs: straight silhouette, generous through thigh and hem -->
  <path d="M40,52 L34,194 L76,194 L80,96 L84,194 L126,194 L120,52"/>
  <line x1="80" y1="52" x2="80" y2="96"/>
  <!-- welt-zip side pockets (signature Scholar detail) -->
  <rect x="44" y="62" width="18" height="4" rx="1"/>
  <rect x="98" y="62" width="18" height="4" rx="1"/>
  <!-- zipper teeth hint -->
  <line x1="46" y1="64" x2="60" y2="64" stroke-dasharray="1 1.5"/>
  <line x1="100" y1="64" x2="114" y2="64" stroke-dasharray="1 1.5"/>
  <!-- zipper pull dots -->
  <circle cx="60" cy="64" r="1"/>
  <circle cx="100" cy="64" r="1"/>
  <!-- soft hem crease at bottom (knit fabric) -->
  <path d="M36,186 Q56,184 76,186" stroke-dasharray="3 3"/>
  <path d="M84,186 Q104,184 124,186" stroke-dasharray="3 3"/>
</svg>
