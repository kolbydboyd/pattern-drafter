<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- canvas work coat: band collar, oversized, long, 4 pockets -->
  <!-- band collar -->
  <rect x="70" y="30" width="20" height="10" rx="2"/>
  <!-- body + sleeves -->
  <path d="M66,40 L38,54 L34,132 L52,132 L52,186 L108,186 L108,132 L126,132 L122,54 L94,40"/>
  <!-- button placket -->
  <line x1="80" y1="40" x2="80" y2="186"/>
  <circle cx="80" cy="60" r="2"/>
  <circle cx="80" cy="80" r="2"/>
  <circle cx="80" cy="100" r="2"/>
  <circle cx="80" cy="120" r="2"/>
  <circle cx="80" cy="140" r="2"/>
  <!-- chest flap pockets -->
  <rect x="54" y="72" width="20" height="16" rx="1"/>
  <rect x="86" y="72" width="20" height="16" rx="1"/>
  <line x1="54" y1="72" x2="74" y2="72"/>
  <line x1="86" y1="72" x2="106" y2="72"/>
  <!-- lower patch pockets -->
  <rect x="52" y="120" width="22" height="28" rx="2"/>
  <rect x="86" y="120" width="22" height="28" rx="2"/>
</svg>
