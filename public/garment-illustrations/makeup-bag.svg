<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- pouch body with boxed corners -->
  <path d="M28,75 L132,75 L132,155 L118,155 L118,163 L42,163 L42,155 L28,155 Z"/>

  <!-- zipper at top -->
  <line x1="28" y1="75" x2="132" y2="75"/>
  <!-- zipper teeth -->
  <line x1="36" y1="71" x2="36" y2="79" stroke-width="1"/>
  <line x1="46" y1="71" x2="46" y2="79" stroke-width="1"/>
  <line x1="56" y1="71" x2="56" y2="79" stroke-width="1"/>
  <line x1="66" y1="71" x2="66" y2="79" stroke-width="1"/>
  <line x1="76" y1="71" x2="76" y2="79" stroke-width="1"/>
  <line x1="86" y1="71" x2="86" y2="79" stroke-width="1"/>
  <line x1="96" y1="71" x2="96" y2="79" stroke-width="1"/>
  <line x1="106" y1="71" x2="106" y2="79" stroke-width="1"/>
  <line x1="116" y1="71" x2="116" y2="79" stroke-width="1"/>
  <line x1="126" y1="71" x2="126" y2="79" stroke-width="1"/>

  <!-- zipper pull -->
  <rect x="72" y="63" width="10" height="12" rx="1" stroke-width="1.2"/>

  <!-- boxed corner stitch lines -->
  <line x1="118" y1="155" x2="132" y2="155" stroke-dasharray="3 2" stroke-width="1"/>
  <line x1="28" y1="155" x2="42" y2="155" stroke-dasharray="3 2" stroke-width="1"/>

  <!-- topstitch -->
  <line x1="32" y1="81" x2="128" y2="81" stroke-dasharray="3 2" stroke-width="1"/>

</svg>
