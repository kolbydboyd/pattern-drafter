<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- chore coat: camp collar, button front, hip length, patch pockets -->
  <!-- camp collar -->
  <path d="M68,38 L72,52 L80,44 L88,52 L92,38"/>
  <path d="M68,38 Q72,32 80,30 Q88,32 92,38"/>
  <!-- body + sleeves -->
  <path d="M68,38 L40,54 L36,130 L54,130 L54,170 L106,170 L106,130 L124,130 L120,54 L92,38"/>
  <!-- button placket -->
  <line x1="80" y1="44" x2="80" y2="170"/>
  <!-- buttons -->
  <circle cx="80" cy="64" r="2"/>
  <circle cx="80" cy="84" r="2"/>
  <circle cx="80" cy="104" r="2"/>
  <circle cx="80" cy="124" r="2"/>
  <circle cx="80" cy="144" r="2"/>
  <!-- left chest flap pocket -->
  <rect x="56" y="74" width="18" height="16" rx="1"/>
  <line x1="56" y1="74" x2="74" y2="74"/>
  <circle cx="65" cy="72" r="1.2"/>
  <!-- right chest flap pocket -->
  <rect x="86" y="74" width="18" height="16" rx="1"/>
  <line x1="86" y1="74" x2="104" y2="74"/>
  <circle cx="95" cy="72" r="1.2"/>
  <!-- lower patch pockets -->
  <rect x="54" y="118" width="20" height="24" rx="2"/>
  <rect x="86" y="118" width="20" height="24" rx="2"/>
  <!-- sleeve cuffs -->
  <rect x="36" y="122" width="18" height="10" rx="2"/>
  <rect x="106" y="122" width="18" height="10" rx="2"/>
</svg>
