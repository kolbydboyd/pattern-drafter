<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Soloist Jeans: straight leg, mid rise, square-scoop pocket, pointed yoke -->
  <!-- waistband -->
  <path d="M42,38 L118,38 L118,50 L42,50 Z"/>
  <!-- belt loops -->
  <rect x="55" y="35" width="6" height="8" rx="1"/>
  <rect x="77" y="35" width="6" height="8" rx="1"/>
  <rect x="99" y="35" width="6" height="8" rx="1"/>
  <!-- straight-leg silhouette -->
  <path d="M42,50 L38,194 L74,194 L80,90 L86,194 L122,194 L118,50"/>
  <line x1="80" y1="50" x2="80" y2="90"/>
  <!-- fly -->
  <path d="M80,50 Q76,62 80,68"/>
  <!-- square-scoop front pockets (signature Soloist opening: horizontal top, vertical side) -->
  <path d="M50,54 L68,54 L68,66 L56,66 L56,72"/>
  <path d="M110,54 L92,54 L92,66 L104,66 L104,72"/>
  <!-- coin pocket inside right scoop -->
  <rect x="58" y="56" width="8" height="7" rx="0.5"/>
  <!-- rivet dots at pocket corners -->
  <circle cx="68" cy="54" r="1.1"/>
  <circle cx="56" cy="72" r="1.1"/>
  <circle cx="92" cy="54" r="1.1"/>
  <circle cx="104" cy="72" r="1.1"/>
  <!-- pointed back yoke hinted through fabric (V-shape behind waistband) -->
  <path d="M50,50 L80,58 L110,50" stroke-dasharray="3 2"/>
  <!-- topstitching along outseam -->
  <line x1="40" y1="80" x2="38" y2="194" stroke-dasharray="4 3"/>
  <line x1="120" y1="80" x2="122" y2="194" stroke-dasharray="4 3"/>
</svg>
