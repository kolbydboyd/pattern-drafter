<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- Waistband (taller for elastic + drawcord) -->
  <path d="M40,34 L120,34 L120,52 L40,52 Z"/>

  <!-- Trouser legs: relaxed/wide fit -->
  <path d="M40,52 L34,196 L76,196 L80,94 L84,196 L126,196 L120,52"/>

  <!-- Rise / crotch line -->
  <line x1="80" y1="52" x2="80" y2="94"/>

  <!-- Double pleats — left side (2 pleats) -->
  <path d="M62,54 L60,66 L64,66"/>
  <path d="M70,54 L68,66 L72,66"/>

  <!-- Double pleats — right side (2 pleats, mirror) -->
  <path d="M90,54 L92,66 L88,66"/>
  <path d="M98,54 L100,66 L96,66"/>

  <!-- Slant pocket openings -->
  <path d="M40,62 L54,80"/>
  <path d="M120,62 L106,80"/>

  <!-- Crease lines down each leg -->
  <line x1="54" y1="98" x2="50" y2="196"/>
  <line x1="106" y1="98" x2="110" y2="196"/>

</svg>
