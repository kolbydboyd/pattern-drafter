  <path d="M94,52 L108,80" stroke-dasharray="4 3"/>
  <!-- ribbed cuffs -->
  <rect x="28" y="124" width="24" height="10" rx="3"/>
  <rect x="108" y="124" width="24" height="10" rx="3"/>
  <!-- ribbed hem band -->
  <rect x="52" y="164" width="56" height="10" rx="3"/>
