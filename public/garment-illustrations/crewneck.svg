<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- ribbed crew neckline -->
  <path d="M66,48 Q80,42 94,48"/>
  <path d="M64,52 Q80,46 96,52"/>
  <!-- V-notch at neck -->
  <path d="M76,50 L80,56 L84,50"/>
  <!-- body + sleeves: boxy -->
  <path d="M62,52 L28,70 L28,132 L52,132 L52,172 L108,172 L108,132 L132,132 L132,70 L98,52"/>
