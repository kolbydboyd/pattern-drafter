<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- waistband -->
  <path d="M44,38 L116,38 L116,50 L44,50 Z"/>
  <!-- belt loops -->
  <rect x="56" y="35" width="5" height="8" rx="1"/>
  <rect x="99" y="35" width="5" height="8" rx="1"/>
  <rect x="78" y="35" width="5" height="8" rx="1"/>
  <!-- legs: straight, slightly narrow -->
  <path d="M44,50 L40,194 L74,194 L80,92 L86,194 L120,194 L116,50"/>
  <line x1="80" y1="50" x2="80" y2="92"/>
  <!-- fly -->
  <path d="M80,50 Q76,62 80,68"/>
  <!-- front slant pockets -->
  <path d="M48,52 Q56,64 66,58"/>
  <path d="M112,52 Q104,64 94,58"/>
  <!-- coin pocket (small, inside right pocket) -->
  <rect x="48" y="56" width="10" height="8" rx="1"/>
  <!-- rivet dots -->
  <circle cx="50" cy="62" r="1.2"/>
  <circle cx="66" cy="58" r="1.2"/>
  <circle cx="110" cy="62" r="1.2"/>
  <circle cx="94" cy="58" r="1.2"/>
  <!-- topstitching lines along outseam -->
  <line x1="42" y1="90" x2="40" y2="194" stroke-dasharray="4 3"/>
  <line x1="118" y1="90" x2="120" y2="194" stroke-dasharray="4 3"/>
</svg>