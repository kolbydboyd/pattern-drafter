<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- waistband casing -->
  <rect x="30" y="30" width="100" height="14" rx="2"/>
  <!-- elastic casing line -->
  <line x1="30" y1="37" x2="130" y2="37" stroke-dasharray="4 3" stroke-width="1"/>
  <!-- drawstring exit holes -->
  <circle cx="74" cy="34" r="1.5" stroke-width="1"/>
  <circle cx="86" cy="34" r="1.5" stroke-width="1"/>

  <!-- left leg -->
  <path d="M30,44 L70,44 L72,190 L32,190 Z"/>
  <!-- right leg -->
  <path d="M90,44 L130,44 L128,190 L88,190 Z"/>

  <!-- crotch curve hint -->
  <path d="M70,44 Q80,64 90,44" stroke-dasharray="3 2" stroke-width="1"/>

  <!-- hem fold lines -->
  <line x1="32" y1="182" x2="72" y2="182" stroke-dasharray="3 2" stroke-width="1"/>
  <line x1="88" y1="182" x2="128" y2="182" stroke-dasharray="3 2" stroke-width="1"/>

</svg>
