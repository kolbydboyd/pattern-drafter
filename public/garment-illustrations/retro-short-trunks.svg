<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- retro short trunks: very short (3" inseam), slim, 1" side slits, small side pocket -->
  <!-- waistband -->
  <path d="M46,44 L114,44 L114,56 L46,56 Z"/>
  <!-- drawcord on front half only (hybrid elastic-back / drawcord-front waistband) -->
  <path d="M62,44 Q80,50 98,44"/>
  <!-- slim short body — legs end at y=92, ~36 units below waistband -->
  <path d="M46,56 L45,92 Q58,96 75,92 L80,74 L85,92 Q102,96 115,92 L114,56"/>
  <!-- crotch seam -->
  <line x1="80" y1="56" x2="80" y2="74"/>
  <!-- side slits (1") at hem -->
  <line x1="45" y1="84" x2="46" y2="92"/>
  <line x1="115" y1="84" x2="114" y2="92"/>
  <!-- small side pocket (dashed) -->
  <rect x="88" y="62" width="18" height="18" rx="2" stroke-dasharray="3 2"/>
</svg>
