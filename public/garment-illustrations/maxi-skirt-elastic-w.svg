<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- elastic waistband casing (taller, pull-on) -->
  <rect x="40" y="18" width="80" height="16" rx="2"/>
  <!-- elastic casing line -->
  <line x1="40" y1="26" x2="120" y2="26" stroke-dasharray="4 3" stroke-width="1"/>

  <!-- skirt silhouette — A-line flaring to floor -->
  <path d="M40,34 L120,34 L142,188 L18,188 Z"/>

  <!-- hem fold line -->
  <line x1="20" y1="180" x2="140" y2="180" stroke-dasharray="3 2" stroke-width="1"/>

  <!-- side seam hints -->
  <line x1="42" y1="62" x2="40" y2="66" stroke-dasharray="2 2" stroke-width="1"/>
  <line x1="118" y1="62" x2="120" y2="66" stroke-dasharray="2 2" stroke-width="1"/>

</svg>
