<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- Flexbelt waistband with elasticated sides -->
  <path d="M42,36 L118,36 L118,48 L42,48 Z"/>
  <path d="M46,40 Q50,44 54,40" stroke-width="1"/>
  <path d="M106,40 Q110,44 114,40" stroke-width="1"/>

  <!-- Belt loops -->
  <rect x="56" y="33" width="5" height="8" rx="1"/>
  <rect x="99" y="33" width="5" height="8" rx="1"/>

  <!-- Pant legs (slightly tapered) -->
  <path d="M42,48 L38,178 L72,178 L80,76 L88,178 L122,178 L118,48"/>

  <!-- Center front seam -->
  <line x1="80" y1="48" x2="80" y2="76"/>

  <!-- Multi-compartment cargo pocket - left leg -->
  <rect x="40" y="88" width="24" height="28" rx="2"/>
  <!-- Cargo flap -->
  <line x1="40" y1="94" x2="64" y2="94"/>
  <!-- Internal divider -->
  <line x1="52" y1="94" x2="52" y2="116" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Smartphone pocket -->
  <path d="M40,100 L46,100 L46,116" stroke-width="1"/>

  <!-- Multi-compartment cargo pocket - right leg -->
  <rect x="96" y="88" width="24" height="28" rx="2"/>
  <line x1="96" y1="94" x2="120" y2="94"/>
  <line x1="108" y1="94" x2="108" y2="116" stroke-width="1" stroke-dasharray="2,2"/>
  <path d="M120,100 L114,100 L114,116" stroke-width="1"/>

  <!-- Knee pad area indicators -->
  <rect x="42" y="130" width="26" height="18" rx="3" stroke-dasharray="3,2" stroke-width="1"/>
  <rect x="92" y="130" width="26" height="18" rx="3" stroke-dasharray="3,2" stroke-width="1"/>

  <!-- Double inseam stitch lines -->
  <line x1="72" y1="178" x2="80" y2="76" stroke-width="0.7" stroke-dasharray="1,2"/>
  <line x1="88" y1="178" x2="80" y2="76" stroke-width="0.7" stroke-dasharray="1,2"/>
</svg>