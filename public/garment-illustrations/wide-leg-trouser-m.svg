<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- wide-leg trouser men's: flat front, structured waistband, full-width leg -->
  <path d="M38,38 L122,38 L122,50 L38,50 Z"/>
  <!-- fly tab -->
  <rect x="74" y="35" width="12" height="8" rx="1"/>
