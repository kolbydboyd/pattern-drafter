  <line x1="108" y1="50" x2="108" y2="196" stroke-dasharray="4,3"/>
  <!-- fly -->
  <line x1="80" y1="50" x2="80" y2="90"/>
  <!-- slant pocket lines -->
  <path d="M62,50 L50,70"/>
  <path d="M98,50 L110,70"/>
