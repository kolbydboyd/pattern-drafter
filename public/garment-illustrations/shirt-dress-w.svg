<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- collar -->
  <path d="M68,32 L76,46 L80,38 L84,46 L92,32"/>
  <path d="M72,30 L80,22 L88,30"/>
  <!-- body + short sleeves with cuffs -->
  <path d="M68,32 L46,44 L42,90 L56,90"/>
  <path d="M92,32 L114,44 L118,90 L104,90"/>
  <!-- sleeve cuff lines -->
  <line x1="42" y1="84" x2="56" y2="84"/>
  <line x1="118" y1="84" x2="104" y2="84"/>
  <!-- bodice -->
  <path d="M56,90 L56,104 L104,104 L104,90"/>
  <!-- waistline seam -->
  <line x1="56" y1="104" x2="104" y2="104"/>
  <!-- button placket from neck to waist -->
  <line x1="80" y1="38" x2="80" y2="104"/>
  <!-- buttons on bodice -->
  <circle cx="80" cy="56" r="1.5"/>
  <circle cx="80" cy="72" r="1.5"/>
  <circle cx="80" cy="88" r="1.5"/>
  <!-- full skirt -->
  <path d="M56,104 L38,192 L122,192 L104,104"/>
  <!-- skirt center line (extends placket) -->
  <line x1="80" y1="104" x2="80" y2="192" stroke-dasharray="5 4"/>
</svg>