<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Kids Joggers: shorter legs, elastic waistband, tapered cuffs -->
  <!-- Waistband -->
  <path d="M48,44 L112,44 L112,56 L48,56 Z"/>
  <path d="M68,44 Q80,50 92,44"/>
  <!-- Leg panels (shorter than adult, tapered at hem) -->
  <path d="M48,56 L46,162 L72,162 L80,90 L88,162 L114,162 L112,56"/>
  <!-- Center crotch line -->
  <line x1="80" y1="56" x2="80" y2="90"/>
  <!-- Rib cuffs at hem -->
  <rect x="46" y="160" width="26" height="8" rx="3"/>
  <rect x="88" y="160" width="26" height="8" rx="3"/>
  <!-- Drawstring channel -->
  <path d="M62,64 L62,74 Q80,78 98,74 L98,64"/>
</svg>
