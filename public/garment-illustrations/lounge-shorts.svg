<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- waistband casing -->
  <rect x="30" y="38" width="100" height="12" rx="2"/>
  <!-- elastic casing line -->
  <line x1="30" y1="44" x2="130" y2="44" stroke-dasharray="4 3" stroke-width="1"/>

  <!-- left short leg -->
  <path d="M30,50 L70,50 L72,128 L32,128 Z"/>
  <!-- right short leg -->
  <path d="M90,50 L130,50 L128,128 L88,128 Z"/>

  <!-- crotch curve hint -->
  <path d="M70,50 Q80,68 90,50" stroke-dasharray="3 2" stroke-width="1"/>

  <!-- hem fold lines -->
  <line x1="32" y1="120" x2="72" y2="120" stroke-dasharray="3 2" stroke-width="1"/>
  <line x1="88" y1="120" x2="128" y2="120" stroke-dasharray="3 2" stroke-width="1"/>

</svg>
