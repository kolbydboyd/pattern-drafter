<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- hiking shorts: cargo pockets + drawstring waistband (no belt loops) -->
  <path d="M42,38 L118,38 L118,50 L42,50 Z"/>
  <!-- drawcord curve (drawstring waist, no belt loops) -->
  <path d="M56,38 Q80,44 104,38"/>
  <!-- body panels -->
  <path d="M42,50 L40,124 L74,124 L80,80 L86,124 L120,124 L118,50"/>
  <!-- crotch seam -->
  <line x1="80" y1="50" x2="80" y2="80"/>
  <!-- cargo pocket left, with flap line -->
  <rect x="44" y="74" width="22" height="26" rx="2"/>
  <line x1="44" y1="80" x2="66" y2="80"/>
  <!-- cargo pocket right, with flap line -->
  <rect x="94" y="74" width="22" height="26" rx="2"/>
  <line x1="94" y1="80" x2="116" y2="80"/>
</svg>
