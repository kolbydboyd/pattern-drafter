<body class="pg pg-scrollable">

<header class="hdr">
  <h1 onclick="location.href='/'">People's Patterns</h1>
  <span class="v" style="margin-left:8px">Admin</span>
  <div style="margin-left:auto">
    <button id="adm-theme-btn" class="adm-theme-btn" aria-label="Toggle theme">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <defs><mask id="dm-mask"><rect x="0" y="0" width="100%" height="100%" fill="white"/><circle class="dark-mode-toggle__cut-out" r="6" cx="24" cy="10" fill="black"/></mask></defs>
        <circle class="dark-mode-toggle__center-circle" r="6" cx="12" cy="12" fill="currentColor" mask="url(#dm-mask)"/>
        <g class="dark-mode-toggle__rays" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="12" x2="12" y1="3" y2="1"/><line x1="21" x2="23" y1="12" y2="12"/>
          <line x1="12" x2="12" y1="21" y2="23"/><line x1="1" x2="3" y1="12" y2="12"/>
        </g>
      </svg>
    </button>
  </div>
</header>

<main class="pg-content" id="admin-root" style="max-width:1100px;width:100%;margin:0 auto;padding:24px 16px 80px;">
  <div style="text-align:center;padding:60px 0;color:var(--mid);font-size:.83rem;">Loading...</div>
</main>

<script type="module" src="/src/ui/admin.js"></script>
