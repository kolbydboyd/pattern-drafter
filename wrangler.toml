name = "peoples-patterns"
pages_build_output_dir = "dist"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Environment variables (non-secret) can be added here or in the Cloudflare dashboard.
# Secrets (STRIPE_SECRET_KEY, SUPABASE_SERVICE_ROLE_KEY, etc.) must be set via:
#   wrangler pages secret put <NAME>
# or the Cloudflare Pages dashboard → Settings → Environment variables.
#
# Required secrets:
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   RESEND_API_KEY
#   CRON_SECRET
#   INTERNAL_SECRET
#   IFTTT_WEBHOOK_KEY
#   ADMIN_API_KEY
#   FROM_EMAIL
#   ADMIN_EMAIL
#   SITE_URL
#   LAMBDA_GENERATE_URL
#   LAMBDA_REGENERATE_URL
